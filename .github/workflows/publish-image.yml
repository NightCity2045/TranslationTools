name: Create and publish TranslationTools image

on:
  # Автоматическая публикация при изменениях в main.
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "download_models.sh"
      - "requirements.txt"
      - "app/**"
      - "config/**"
      - ".github/workflows/docker-publish.yml"

  # Возможность запустить сборку вручную.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          # Явно создаём:
          # ghcr.io/nightcity2045/translationtools:main
          # ghcr.io/nightcity2045/translationtools:sha-xxxxxxx
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.title=Night City 2045 TranslationTools
            org.opencontainers.image.description=RU-EN translation service for Night City 2045
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime

          platforms: linux/amd64

          push: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
