services:
  nc-translation:
    image: ghcr.io/nightcity2045/translationtools:main
    pull_policy: always

    container_name: nc-translation
    restart: unless-stopped

    environment:
      NC_TRANSLATION_HOST: "0.0.0.0"
      NC_TRANSLATION_PORT: "8090"

      # Обязательно замени на новый секретный ключ.
      NC_TRANSLATION_API_KEY: "CHANGE_THIS_API_KEY"

      # Эти пути должны совпадать с volumes ниже.
      NC_TRANSLATION_MODEL_ROOT: "/app/models"
      NC_TRANSLATION_TOKENIZER_ROOT: "/app/tokenizers"
      NC_TRANSLATION_GLOSSARY_PATH: "/app/config/glossary.json"

      NC_TRANSLATION_MAX_TEXT_LENGTH: "240"

      NC_TRANSLATION_CACHE_TTL_SECONDS: "3600"
      NC_TRANSLATION_CACHE_MAX_ITEMS: "10000"

      NC_TRANSLATION_INTER_THREADS: "1"
      NC_TRANSLATION_INTRA_THREADS: "2"

      NC_TRANSLATION_BEAM_SIZE: "1"
      NC_TRANSLATION_MAX_DECODING_LENGTH: "128"
      NC_TRANSLATION_COMPUTE_TYPE: "default"

    ports:
      - "7090:8090"

    volumes:
      # Постоянное хранение моделей.
      - models:/app/models
      - tokenizers:/app/tokenizers

      # Пользовательский глоссарий.
      - ./glossary.json:/app/config/glossary.json:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  models:
  tokenizers:
