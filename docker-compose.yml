services:
  nc-translation:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: nightcity2045/translationtools:local
    container_name: nc-translation
    restart: unless-stopped

    environment:
      NC_TRANSLATION_HOST: "0.0.0.0"
      NC_TRANSLATION_PORT: "8090"
      NC_TRANSLATION_API_KEY: "change-me"

      NC_TRANSLATION_MODEL_ROOT: "/app/models"
      NC_TRANSLATION_TOKENIZER_ROOT: "/app/tokenizers"
      NC_TRANSLATION_GLOSSARY_PATH: "/app/config/glossary.json"

      NC_TRANSLATION_MAX_TEXT_LENGTH: "240"

      NC_TRANSLATION_CACHE_TTL_SECONDS: "3600"
      NC_TRANSLATION_CACHE_MAX_ITEMS: "10000"

      NC_TRANSLATION_INTER_THREADS: "1"
      NC_TRANSLATION_INTRA_THREADS: "2"

      NC_TRANSLATION_BEAM_SIZE: "1"
      NC_TRANSLATION_MAX_DECODING_LENGTH: "128"
      NC_TRANSLATION_COMPUTE_TYPE: "default"

    ports:
      - "8090:8090"

    volumes:
      - models:/app/models
      - tokenizers:/app/tokenizers
      - ./config:/app/config:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; port=os.getenv('NC_TRANSLATION_PORT', '8090'); urllib.request.urlopen('http://127.0.0.1:' + port + '/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  models:
  tokenizers:
