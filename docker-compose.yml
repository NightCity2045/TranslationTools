services:
  nc-translation:
    build: .
    container_name: nc-translation
    restart: unless-stopped

    environment:
      NC_TRANSLATION_HOST: 0.0.0.0
      NC_TRANSLATION_PORT: 8090
      NC_TRANSLATION_API_KEY: change-me
      NC_TRANSLATION_MODEL_ROOT: /app/models
      NC_TRANSLATION_TOKENIZER_ROOT: /app/tokenizers
      NC_TRANSLATION_GLOSSARY_PATH: /app/config/glossary.json

    ports:
      - "8090:8090"

    volumes:
      - models:/app/models
      - tokenizers:/app/tokenizers
      - ./config:/app/config:ro

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

# Это отдельный верхнеуровневый раздел.
# Он находится на одном уровне с services.
volumes:
  models:
  tokenizers:
