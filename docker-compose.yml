services:
  nc-translation:
    build: .
    container_name: nc-translation
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./models:/app/models:ro
      - ./tokenizers:/app/tokenizers:ro
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
