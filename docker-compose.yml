services:
  nc-translation:
    build:
      context: .
      target: runtime

    container_name: nc-translation
    restart: unless-stopped

    environment:
      NC_TRANSLATION_HOST: "${NC_TRANSLATION_HOST:-0.0.0.0}"
      NC_TRANSLATION_PORT: "${NC_TRANSLATION_PORT:-8090}"
      NC_TRANSLATION_API_KEY: "${NC_TRANSLATION_API_KEY:-change-me}"

      # Эти пути находятся внутри Docker-образа.
      NC_TRANSLATION_MODEL_ROOT: "/app/models"
      NC_TRANSLATION_TOKENIZER_ROOT: "/app/tokenizers"
      NC_TRANSLATION_GLOSSARY_PATH: "/app/config/glossary.json"

      NC_TRANSLATION_MAX_TEXT_LENGTH: "${NC_TRANSLATION_MAX_TEXT_LENGTH:-240}"
      NC_TRANSLATION_CACHE_TTL_SECONDS: "${NC_TRANSLATION_CACHE_TTL_SECONDS:-3600}"
      NC_TRANSLATION_CACHE_MAX_ITEMS: "${NC_TRANSLATION_CACHE_MAX_ITEMS:-10000}"

      NC_TRANSLATION_INTER_THREADS: "${NC_TRANSLATION_INTER_THREADS:-1}"
      NC_TRANSLATION_INTRA_THREADS: "${NC_TRANSLATION_INTRA_THREADS:-2}"

      NC_TRANSLATION_BEAM_SIZE: "${NC_TRANSLATION_BEAM_SIZE:-1}"
      NC_TRANSLATION_MAX_DECODING_LENGTH: "${NC_TRANSLATION_MAX_DECODING_LENGTH:-128}"
      NC_TRANSLATION_COMPUTE_TYPE: "${NC_TRANSLATION_COMPUTE_TYPE:-default}"

    ports:
      - "${NC_TRANSLATION_PORT:-8090}:${NC_TRANSLATION_PORT:-8090}"

    volumes:
      # Оставляем только конфиг, чтобы glossary можно было менять
      # без пересборки Docker-образа.
      - ./config:/app/config:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.getenv('NC_TRANSLATION_PORT', '8090') + '/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
